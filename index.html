<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeff Smyth — Designer / Photographer / Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --purple-deep:   #1a0a2e;
      --purple-mid:    #5b1fa6;
      --purple-bright: #7b2fd4;
      --purple-glow:   #9b4de0;
      --teal:          #00e5c8;
      --teal-dark:     #00c4ab;
      --white:         #ffffff;
      --status-red:    #ff5555;
      --font:          'Outfit', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background-color: var(--purple-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Background radial glow ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 60% 50%, var(--purple-bright) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 20% 80%, var(--purple-mid) 0%, transparent 60%),
        linear-gradient(160deg, #2a0e4a 0%, #0f0520 100%);
      pointer-events: none;
    }

    /* ── Rounded card wrapper ── */
    .card {
      position: relative;
      z-index: 1;
      flex: 1;
      margin: 12px;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255 255 255 / 0.07);
    }

    /* ── Max-width inner container (matches 1440px Figma frame) ── */
    .inner {
      width: 100%;
      max-width: 1440px;
      margin-inline: auto;
    }

    /* ── Nav bar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
    }

    nav .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(255 255 255 / 0.85);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--status-red);
      box-shadow: 0 0 8px var(--status-red);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px var(--status-red); }
      50%       { box-shadow: 0 0 14px var(--status-red); }
    }

    .btn-portfolio {
      display: inline-flex;
      align-items: center;
      padding: 12px 26px;
      border-radius: 999px;
      background: var(--teal);
      color: #0d1f1c;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.01em;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn-portfolio:hover {
      background: var(--teal-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0 229 200 / 0.35);
    }

    .btn-portfolio:active {
      transform: translateY(0);
    }

    /* ── Hero section ── */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 60px 60px;
    }

    .hero .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      width: 100%;
    }

    /* ── Left: text content ── */
    .hero-text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .role {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    .name {
      font-size: clamp(4rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .contact-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 400;
      color: rgba(255 255 255 / 0.9);
    }

    .contact-list svg {
      flex-shrink: 0;
      color: var(--teal);
    }

    /* ── Right: pixel avatar ── */
    .hero-avatar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pixel-face {
      width: clamp(220px, 30vw, 320px);
      height: auto;
      filter: drop-shadow(0 0 40px rgba(155 77 224 / 0.6));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .card {
        margin: 8px;
        border-radius: 16px;
      }

      nav {
        padding: 16px 20px;
      }

      .hero {
        flex-direction: column;
        align-items: flex-start;
        padding: 20px 28px 48px;
        gap: 32px;
      }

      .hero .inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-avatar {
        order: -1;
        width: 100%;
        justify-content: center;
      }

      .pixel-face {
        width: clamp(150px, 50vw, 220px);
      }

      .name {
        font-size: clamp(3.2rem, 14vw, 5rem);
        margin-bottom: 24px;
      }

      .role {
        font-size: 1rem;
      }
    }

    @media (max-width: 420px) {
      .btn-portfolio {
        padding: 10px 18px;
        font-size: 0.85rem;
      }

      .name {
        font-size: clamp(2.8rem, 16vw, 4rem);
      }
    }
  </style>
</head>
